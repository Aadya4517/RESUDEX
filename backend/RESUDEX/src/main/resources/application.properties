spring.application.name=RESUDEX

# H2 File-Based Database (Persists data)
spring.datasource.url=jdbc:h2:file:./data/resudexdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (open http://localhost:8080/h2-console to inspect DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Run schema.sql and data.sql on startup
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.continue-on-error=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8081
