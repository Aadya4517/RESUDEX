<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resudex – Resume Intelligence Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <h1>Resudex – Resume Intelligence Platform</h1>

    <form id="uploadForm">

        <label class="drop-zone" id="dropZone">
            <span>Drag & drop resumes here</span><br>
            <strong>or click to browse</strong>
            <input type="file" id="resumes" multiple hidden>
        </label>

        <div class="file-list-wrapper">
            <div id="fileList" class="file-list"></div>
        </div>

        <textarea id="jobDescription"
                  placeholder="Paste job description here..."
                  required></textarea>

        <button type="submit">Analyze Resumes</button>

    </form>

    <!-- PDF EXPORT BUTTON -->
    <button id="exportPdfBtn" class="export-btn hidden">
        Export Report (PDF)
    </button>

    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Analyzing resumes...</p>
    </div>

    <div id="emptyState" class="empty-state">
        Upload resumes and add a job description to begin.
    </div>

    <div id="summary" class="summary hidden"></div>

    <div id="results" class="grid"></div>
    <div id="pdfReport" class="pdf-report hidden"></div>

</div>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
